<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novara Pro Modeller</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="d-flex" id="wrapper">
    <div class="bg-dark text-white" id="sidebar-wrapper">
        <div class="sidebar-heading text-center py-4 primary-text fs-4 fw-bold text-uppercase border-bottom">
            <i class="fas fa-chart-line me-2"></i>Novara
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="#" class="list-group-item list-group-item-action bg-transparent text-white active" data-tab="cma">
                <i class="fas fa-coins me-2"></i> Markets (CMA)
            </a>
            <a href="#" class="list-group-item list-group-item-action bg-transparent text-white" data-tab="lifestyle">
                <i class="fas fa-route me-2"></i> Lifestyle / Glidepath
            </a>
            <a href="#" class="list-group-item list-group-item-action bg-transparent text-white" data-tab="persona">
                <i class="fas fa-user me-2"></i> Member Persona
            </a>
            <a href="#" class="list-group-item list-group-item-action bg-transparent text-white" data-tab="model">
                <i class="fas fa-laptop-code me-2"></i> Run Model
            </a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-primary" id="menu-toggle"><i class="fas fa-bars"></i></button>
                <div id="status-indicator" class="ms-auto text-success fw-bold">
                    <span id="status-text">Ready</span> 
                    <div class="spinner-border spinner-border-sm text-primary d-none" id="loading-spinner" role="status"></div>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4 mt-4">
            
            <div id="tab-cma" class="view-section">
                <h3 class="mb-4">Capital Market Assumptions</h3>
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label>Load CMA Set</label>
                                <select id="cma-select" class="form-select"></select>
                            </div>
                            <div class="col-md-6 text-end align-self-end">
                                <button class="btn btn-outline-success" id="save-cma-btn"><i class="fas fa-save"></i> Save</button>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle" id="cma-table">
                                <thead class="table-light">
                                    <tr>
                                        <th>Asset Class</th>
                                        <th>Return (%)</th>
                                        <th>Vol (%)</th>
                                        <th>Corr w/ Equity</th>
                                        <th>Corr w/ Credit</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-model" class="view-section d-none">
                <div class="row">
                    <div class="col-lg-4">
                        <div class="card shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <i class="fas fa-sliders-h"></i> Configuration
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">Persona</label>
                                    <select id="run-persona-select" class="form-select"></select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Market Assumptions</label>
                                    <select id="run-cma-select" class="form-select"></select>
                                </div>
                                <hr>
                                <label class="form-label fw-bold">Compare Strategies</label>
                                <div id="strategy-selectors">
                                    </div>
                                <div class="d-grid gap-2 mt-4">
                                    <button class="btn btn-primary btn-lg" id="run-simulation-btn">
                                        <i class="fas fa-play"></i> Run Projection
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <span>Accumulation Outcomes (Adjusted for Inflation)</span>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-secondary active" data-chart="fan">Fan</button>
                                    <button class="btn btn-outline-secondary" data-chart="line">Median</button>
                                </div>
                            </div>
                            <div class="card-body">
                                <canvas id="mainChart" height="300"></canvas>
                            </div>
                        </div>
                        <div id="results-table-container"></div>
                    </div>
                </div>
            </div>

            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
